site_name: Nuzo
site_description: Local-first, auditable memory for AI agents.
site_url: https://nuzo.com.br/
repo_name: fabionfsc/nuzo-memory
repo_url: https://github.com/fabionfsc/nuzo-memory
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
exclude_docs: |
  README.md

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fabionfsc/nuzo-memory
    - icon: fontawesome/solid/globe
      link: https://nuzo.com.br/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Install And Use:
      - Overview: getting-started/index.md
      - Clean Install Walkthrough: getting-started/clean-install.md
      - Agent Memory Loop: getting-started/agent-memory-loop.md
      - Local CLI: operations/local-cli.md
      - MCP Tools: spec/tools.md
      - Codex Plugin: operations/codex-plugin.md
      - Claude Code Plugin: operations/claude-code-plugin.md
      - Lifecycle Hooks: operations/lifecycle-hooks.md
      - Optional Semantics: operations/optional-semantics.md
      - Privacy And Security: operations/privacy-and-security.md
  - Product:
      - Vision: product/vision.md
      - Positioning: product/positioning.md
      - Competitive Landscape: product/competitive-landscape.md
      - Requirements: product/requirements.md
  - Architecture:
      - Overview: architecture/overview.md
      - Boundaries: architecture/boundaries.md
      - Memory Trust Boundary: architecture/memory-trust-boundary.md
      - Agent Host Compatibility: architecture/agent-host-compatibility.md
      - Storage: architecture/storage.md
      - Repository Layout: architecture/repository-layout.md
  - Specification:
      - Memory Model: spec/memory-model.md
      - Capture Suggestions: spec/capture-suggestions.md
      - Optional Semantic Retrieval: spec/semantic-retrieval.md
      - Init: spec/init.md
      - API Versioning: spec/api-versioning.md
  - Operations:
      - Roadmap: operations/roadmap.md
      - Release Goals: operations/release-goals.md
      - GitHub Pages: operations/github-pages.md
      - Issue Tracking: operations/issue-tracking.md
      - Specification-Driven Workflow: operations/spec-driven-workflow.md
      - Versioning: operations/versioning.md
      - Release Version Map: operations/release-version-map.md
      - Runtime Support: operations/runtime-support.md
      - npm Publishing: operations/npm-publishing.md
      - Release Checklist: operations/release-checklist.md
      - Post-Release Validation: operations/post-release-validation.md
      - Recall Benchmark: operations/recall-benchmark.md
      - Capture Intelligence Benchmark: operations/capture-benchmark.md
      - Optional Semantics Benchmark: operations/semantic-benchmark.md
      - 0.7.0 Optional Semantics Evaluation: operations/semantic-evaluation-0.7.0.md
      - 0.6.0 Capture Release Gates: operations/capture-release-gates-0.6.0.md
      - Coding Standards: operations/coding-standards.md
      - Testing Strategy: operations/testing-strategy.md
      - GitHub Release Plan: operations/github-release-plan.md
  - Implementation:
      - Stage 1 Core: implementation/stage-1-core.md
  - Decisions:
      - Local First: adr/0001-local-first.md
      - SQLite First: adr/0002-sqlite-first.md
      - MCP First: adr/0003-mcp-first.md
      - Package Boundaries: adr/0004-package-boundaries.md
      - Stable Tool Contracts: adr/0005-stable-tool-contracts.md
      - Host Plugin Runtime Distribution: adr/0006-host-plugin-runtime-distribution.md
      - Test Organization: adr/0007-test-organization.md
      - Opt-In Capture Relationship Evidence: adr/0008-opt-in-capture-relationship-evidence.md
      - Optional Derived Semantic Retrieval: adr/0009-optional-derived-semantic-retrieval.md
