name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_rehearsal_version:
        description: Release version to rehearse.
        required: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"
          - "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check packages
        run: npm run check

      - name: Check release state
        run: npm run release:check

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Run canonical recall benchmark
        run: npm run benchmark:recall

      - name: Run capture intelligence baseline benchmark
        run: npm run benchmark:capture

      - name: Run capture intelligence bounded benchmark
        run: npm run benchmark:capture -- --expect bounded

      - name: Run optional semantics benchmark
        run: npm run benchmark:semantics

      - name: Run optional semantics medium-store benchmark
        run: npm run benchmark:semantics -- --store-size medium

      - name: Package host plugins
        run: npm run package:plugins

      - name: Validate npm artifacts
        run: npm run validate:npm

      - name: Run CLI smoke test
        run: npm run smoke:cli

      - name: Run host hook continuity smoke test
        run: npm run smoke:host-hooks

      - name: Run Claude Code plugin artifact smoke test
        env:
          NUZO_USE_EXISTING_ARTIFACTS: "1"
        run: npm run smoke:claude-code-plugin

      - name: Run Codex plugin artifact smoke test
        env:
          NUZO_USE_EXISTING_ARTIFACTS: "1"
        run: npm run smoke:codex-plugin

  docs:
    name: Documentation validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

  release-rehearsal:
    name: Release rehearsal
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rehearse release
        env:
          RELEASE_REHEARSAL_VERSION: ${{ inputs.release_rehearsal_version }}
        run: npm run release:rehearse -- "$RELEASE_REHEARSAL_VERSION"
