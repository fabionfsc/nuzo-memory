name: Repository Governance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  repository-settings:
    name: Repository settings
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify short-lived branch policy
        shell: bash
        run: |
          test "$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')" = "main"
          test "$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.delete_branch_on_merge')" = "true"
