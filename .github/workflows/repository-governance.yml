name: Repository Governance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  repository-settings:
    name: Repository settings
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify short-lived branch policy
        shell: bash
        run: |
          settings="$(gh api "repos/${GITHUB_REPOSITORY}")"
          jq '{default_branch, delete_branch_on_merge}' <<<"${settings}"
          jq -e '.default_branch == "main" and .delete_branch_on_merge == true' <<<"${settings}" >/dev/null
